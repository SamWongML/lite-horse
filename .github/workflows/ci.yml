name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: litehorse
          POSTGRES_PASSWORD: litehorse
          POSTGRES_DB: litehorse
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U litehorse"
          --health-interval 5s --health-timeout 3s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      LITEHORSE_ENV: local
      LITEHORSE_DATABASE_URL: postgresql+asyncpg://litehorse:litehorse@localhost:5432/litehorse
      LITEHORSE_REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
      - run: uv python install 3.11
      - run: uv sync --all-extras
      - run: uv run ruff check src tests
      - run: uv run mypy src
      - run: uv run alembic -c src/lite_horse/alembic.ini upgrade head
      - run: uv run pytest -q
