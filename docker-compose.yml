services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: litehorse
      POSTGRES_PASSWORD: litehorse
      POSTGRES_DB: litehorse
    ports: ["5432:5432"]
    volumes: [pg-data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "litehorse"]
      interval: 5s

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000", "9001:9001"]
    volumes: [minio-data:/data]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb -p local/litehorse-local-attachments;
      mc mb -p local/litehorse-local-evolve;
      mc mb -p local/litehorse-local-exports;
      mc mb -p local/litehorse-local-audit-archive;
      "

  api:
    build: .
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports: ["8080:8080"]
    command: uvicorn lite_horse.web.app:create_app --factory --host 0.0.0.0 --port 8080 --reload

  scheduler:
    build: .
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    command: python -m lite_horse.scheduler

  worker:
    build: .
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python -m lite_horse.worker

volumes:
  pg-data: {}
  minio-data: {}
